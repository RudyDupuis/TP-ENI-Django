name: CI Minimal
on: [push, pull_request]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Express (MijotonApi)
        run: |
          cd MijotonAPI
          npm audit --audit-level=high

      - name: Audit Django
        run: |
          pip install pip-audit django mozilla-django-oidc
          pip-audit