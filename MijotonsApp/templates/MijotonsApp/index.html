<!DOCTYPE html>
<html>
<body>
    <h2>Mijotons - Recettes</h2>
    
    <form method="GET">
        <input type="text" name="titre" placeholder="Titre...">
        <select name="categorie">
            <option value="">Toutes</option>
            <option value="plat">Plat</option>
            <option value="dessert">Dessert</option>
            <option value="cocktail">Cocktail</option>
        </select>
        <button type="submit">🔍</button>
    </form>

    <hr>

    <a href="/recette/ajouter">➕ Ajouter une recette</a>

    <hr>

    <ul>
        {% for r in listRecette %}
            <li>
                <a href="/recette/{{ r.id }}">{{ r.titre }} - {{ r.categorie }}</a>
                <a href="/recette/{{ r.id }}/modifier">📝</a>
                <a href="/recette/{{ r.id }}/supprimer" onclick="return confirm('Sûr ?')">❌</a>
            </li>
        {% empty %}
            <li>Aucune recette trouvée.</li>
        {% endfor %}
    </ul>
</body>
</html>
